name: Build Windows release

on:
  # Build automatically when a version tag is pushed (e.g. v1.2.0)
  push:
    tags:
      - 'v*'
  # Allow a one-click manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # Pinned to avoid silent breakage from minor-version upgrades.
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build application directory
        # --onedir is faster to start than --onefile because Python does not
        # need to extract itself to %TEMP% on every launch.
        # Distribute the resulting folder as a ZIP instead.
        run: |
          pyinstaller --onedir --windowed -n LegicCardCreator --icon=icon.ico `
            --add-data "app\ui\widgets\control_panel.ui;app\ui\widgets" `
            app\main.py

      - name: Package as ZIP
        run: |
          Compress-Archive -Path dist\LegicCardCreator -DestinationPath dist\LegicCardCreator.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LegicCardCreator-windows
          path: dist/LegicCardCreator.zip
